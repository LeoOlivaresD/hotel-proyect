# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de datos MySQL (Docker Desktop) ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_brief?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=user
spring.datasource.password=user123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Inicialización SQL ────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── CORS (permite peticiones del frontend React en localhost:5173) ─────────────
# Configurado via CorsConfig.java

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.cl.duoc.hotel=DEBUG
